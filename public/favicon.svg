<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#080A0F"/>

  <!-- Very subtle cyan haze behind the bolt -->
  <ellipse cx="16" cy="16" rx="9" ry="11" fill="#00C8FF" opacity="0.06"/>

  <!-- Cyan lightning bolt with glow -->
  <polygon
    points="14,4 4,18 14,18 12,28 28,14 18,14"
    fill="#00C8FF"
    filter="url(#glow)"
  />
</svg>
